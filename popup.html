<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h1>eBay Cleaner</h1>

    <table class="filter-table">
      <thead>
        <tr>
          <th class="col-filter">Filter</th>
          <th class="col-threshold">Threshold</th>
          <th class="col-active">Active</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Feedback count</td>
          <td><input type="number" id="minFeedbackCount" min="0" step="1"></td>
          <td><input type="checkbox" id="filterFeedbackCount"></td>
        </tr>
        <tr>
          <td>Positive feedback %</td>
          <td><input type="number" id="minPositivePercent" min="0" max="100" step="1"></td>
          <td><input type="checkbox" id="filterPositivePercent"></td>
        </tr>
        <tr>
          <td>Classified ads</td>
          <td class="no-threshold">&ndash;</td>
          <td><input type="checkbox" id="filterClassifieds"></td>
        </tr>
      </tbody>
    </table>

    <div class="field">
      <label for="filterMode">Filter mode</label>
      <select id="filterMode">
        <option value="hide">Hide listings</option>
        <option value="dim">Dim listings</option>
      </select>
    </div>

    <div class="field">
      <label for="bannerStyle">Warning banner style</label>
      <select id="bannerStyle">
        <option value="sticky">Sticky (stays on scroll)</option>
        <option value="dismissible">Dismissible</option>
      </select>
    </div>

    <div class="field">
      <label for="galleryMode">Gallery view behavior</label>
      <select id="galleryMode">
        <option value="redirect">Show banner, then redirect</option>
        <option value="banner">Show banner only (no redirect)</option>
      </select>
    </div>

    <div class="actions">
      <button id="save">Save</button>
      <span id="status"></span>
    </div>
  </div>

  <script src="common/settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
